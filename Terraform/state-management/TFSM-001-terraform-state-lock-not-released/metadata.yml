scenario_id: TFSM-001
title: Terraform State Lock Not Released
slug: terraform-state-lock-not-released

category: state-management
domain: terraform

severity: P1
priority: P1
status: ACTIVE

summary: >
  Terraform cannot acquire a state lock because an existing lock is still present.
  This commonly occurs after interrupted operations, failed CI/CD runs,
  backend lock persistence issues, or concurrent Terraform executions.

blast_radius:
  scope: environment
  impact: high

recovery_complexity:
  level: medium
  estimated_time: 15m-30m

escalation:
  level_1: DevOps Engineer
  level_2: Senior DevOps Engineer
  level_3: Platform Engineer
  level_4: Incident Commander

technologies:
  - terraform
  - state-management
  - infrastructure-as-code

tags:
  - terraform-state
  - locking
  - concurrency
  - state-management
  - incident-response

symptoms:
  - terraform apply fails immediately
  - terraform plan fails immediately
  - terraform destroy blocked
  - CI/CD pipeline stuck during terraform execution
  - infrastructure changes blocked

common_error_messages:
  - Error acquiring the state lock
  - Failed to lock state
  - Lock Info
  - state blob is already locked
  - ConditionalCheckFailedException

incident_matchers:
  exact_match:
    - Error acquiring the state lock
    - Failed to lock state

  contains:
    - state lock
    - lock info
    - lock already held
    - lock acquisition failed

  regex:
    - ".*state.*lock.*"
    - ".*lock.*failed.*"
    - ".*acquiring.*state.*"

known_signatures:
  - signature: Error acquiring the state lock
    confidence: 100

  - signature: Failed to lock state
    confidence: 95

  - signature: Lock Info
    confidence: 90

  - signature: ConditionalCheckFailedException
    confidence: 85

root_causes:
  - Interrupted terraform apply operation
  - Abrupt terminal closure
  - CI/CD pipeline failure during apply
  - Concurrent terraform execution
  - Backend lock persistence issue
  - Network failure during state update

investigation_steps:
  - Check active terraform processes
  - Inspect backend lock state
  - Verify CI/CD job status
  - Validate no concurrent operations

recovery_paths:
  - Verify active operations
  - Identify lock owner
  - Force unlock if safe
  - Validate state consistency

rollback_options:
  - Stop all terraform operations
  - Restore state backup
  - Escalate to platform engineering

verification_requirements:
  - No active lock present
  - terraform plan succeeds
  - State accessible
  - Backend healthy
  - No concurrent terraform execution

exit_criteria:
  - Lock removed successfully
  - Terraform commands working
  - Infrastructure state consistent
  - No active incident

related_scenarios:
  - TFSM-002
  - TFSM-003

