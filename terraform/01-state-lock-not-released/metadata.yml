summary: >
  Terraform fails to acquire a state lock because a lock record already exists.
  This commonly occurs when a previous Terraform operation terminates unexpectedly,
  CI/CD pipelines fail, network connectivity is interrupted, or multiple users
  attempt to modify the same state simultaneously.

common_error_messages:

  - |
    Error acquiring the state lock

  - |
    Error locking state

  - |
    Failed to lock state

  - |
    ConditionalCheckFailedException

  - |
    Error acquiring the state lock:
    ConditionalCheckFailedException

  - |
    Lock Info:

  - |
    Error message: resource temporarily unavailable

incident_matchers:

  exact_match:
    - Error acquiring the state lock
    - Error locking state
    - Failed to lock state
    - ConditionalCheckFailedException

  contains:
    - state lock
    - lock info
    - failed to lock state
    - conditionalcheckfailedexception
    - acquiring the state lock

  regex:
    - "(?i).*state lock.*"
    - "(?i).*error acquiring the state lock.*"
    - "(?i).*conditionalcheckfailedexception.*"
    - "(?i).*failed to lock state.*"

known_signatures:

  - signature: "Error acquiring the state lock"
    confidence: 100

  - signature: "ConditionalCheckFailedException"
    confidence: 95

  - signature: "Failed to lock state"
    confidence: 90

  - signature: "Lock Info:"
    confidence: 85

symptoms:

  - terraform plan fails immediately
  - terraform apply fails immediately
  - CI/CD deployment pipeline fails
  - Terraform reports lock acquisition failure
  - State file cannot be modified
  - Infrastructure changes cannot proceed

root_cause_categories:

  - Concurrent Terraform Execution
  - Interrupted Terraform Apply
  - Failed CI/CD Pipeline
  - Network Interruption
  - Stale DynamoDB Lock Entry
  - Backend Lock Corruption
  - Improper Force Unlock Operation

common_root_causes:

  - Previous terraform apply was interrupted
  - CI/CD pipeline terminated unexpectedly
  - User closed terminal during apply
  - Machine shutdown during apply
  - Network connectivity lost during operation
  - Multiple engineers executed apply simultaneously
  - Lock record persisted after process termination
  - Stale lock left in DynamoDB table

affected_backends:

  - AWS S3 + DynamoDB
  - Terraform Cloud
  - Terraform Enterprise
  - Consul Backend

prerequisites_for_recovery:

  - Access to Terraform backend
  - Access to DynamoDB table (if applicable)
  - Access to CI/CD platform logs
  - Permission to perform state operations

recovery_paths:

  - Active Terraform Operation Verification
  - Terraform Force Unlock
  - Backend Lock Investigation
  - Manual DynamoDB Lock Removal

verification_requirements:

  - Lock record removed
  - Terraform state accessible
  - terraform plan executes successfully
  - terraform apply executes successfully
  - No active Terraform process exists
  - CI/CD pipeline succeeds
  - Backend lock entry cleared

rollback_requirements:

  - Restore deleted lock record if removed incorrectly
  - Revalidate active Terraform operations
  - Reinvestigate lock ownership

