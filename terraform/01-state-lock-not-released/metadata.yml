level: Intermediate

scenario_type: Knowledge Scenario

severity:
  - Medium
  - High

production_frequency: Very High

blast_radius: Low

recovery_complexity: Low

estimated_detection_time: "2 minutes"

estimated_recovery_time: "5-15 minutes"

technologies:
  - Terraform
  - AWS S3 Backend
  - AWS DynamoDB
  - Terraform Cloud
